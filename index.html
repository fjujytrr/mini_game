<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Panfani</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,sans-serif}
body{
background:#05070d;
color:#fff;
padding:16px;
}

.container{
max-width:420px;
margin:auto;
}

.card{
background:linear-gradient(145deg,#0c0f1c,#070913);
border-radius:20px;
padding:16px;
margin-bottom:16px;
box-shadow:0 0 40px rgba(128,0,255,.15);
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.logo{
display:flex;
align-items:center;
gap:10px;
}

.logo-circle{
width:48px;height:48px;border-radius:50%;
background:linear-gradient(45deg,#9f0,#a0f);
}

.balance{
text-align:right;
}

.balance h3{font-size:20px}
.balance span{opacity:.6;font-size:12px}

.hero{
background:linear-gradient(120deg,#1a0d2e,#0b0c19);
border-radius:20px;
padding:20px;
margin-bottom:20px;
}

.hero h1{
font-size:24px;
margin-bottom:10px;
}

.hero p{
opacity:.7;
font-size:14px;
margin-bottom:20px;
}

.btn{
background:linear-gradient(90deg,#b5ff00,#a0ff55);
color:#000;
padding:14px;
border:none;
border-radius:12px;
font-weight:600;
width:100%;
cursor:pointer;
}

.tokens{
display:flex;
gap:10px;
}

.token{
flex:1;
background:#0d1020;
border-radius:14px;
padding:10px;
text-align:center;
}

.token small{opacity:.6}

/* modal */
.modal{
position:fixed;
top:0;left:0;
width:100%;height:100%;
background:rgba(0,0,0,.8);
display:none;
align-items:center;
justify-content:center;
padding:20px;
}

.modal.active{display:flex}

.modal-content{
background:#0c0f1c;
padding:20px;
border-radius:20px;
width:100%;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
background:#12152a;
color:#fff;
}

.sell-screen{
display:none;
}

.stat{
background:#0d1020;
padding:10px;
border-radius:10px;
margin-top:10px;
}

.sell-buttons{
display:flex;
gap:10px;
margin-top:10px;
}

.sell-buttons button{
flex:1;
padding:10px;
border-radius:10px;
border:none;
background:#1b1f3d;
color:#fff;
cursor:pointer;
}

.sell-buttons button.active{
background:#8a2cff;
}

.footer{
margin-top:20px;
text-align:center;
opacity:.5;
font-size:12px;
}
</style>
</head>

<body>

<div class="container">

<div class="header">
<div class="logo">
<div class="logo-circle"></div>
<div>
<b>Panfani</b><br>
<small style="opacity:.6">Create. Trade. Own.</small>
</div>
</div>

<div class="balance">
<h3 id="balance">0.678 SOL</h3>
<span>≈ $67.80</span>
</div>
</div>

<div class="hero">
<h1>Твой токен. Твои правила.</h1>
<p>Создавай токены и торгуй ими мгновенно.</p>
<button class="btn" onclick="openModal()">Создать токен</button>
</div>

<div class="tokens">
<div class="token">
<p>MYTOKEN</p>
<small>$12,456</small>
</div>
<div class="token">
<p>CATCOIN</p>
<small>$8,732</small>
</div>
<div class="token">
<p>PANFANI</p>
<small>$3,211</small>
</div>
</div>

<div class="footer">Panfani UI Demo</div>

</div>

<!-- MODAL CREATE -->
<div class="modal" id="modal">
<div class="modal-content">
<h2>Создать токен</h2>

<input id="name" placeholder="Название токена"/>
<input id="ticker" placeholder="Тикер ($CAT)"/>
<input id="amount" type="number" placeholder="Стартовая покупка (SOL)"/>

<button class="btn" onclick="createToken()">Создать</button>
</div>
</div>

<!-- SELL SCREEN -->
<div class="container sell-screen" id="sell">

<h2 id="tokenTitle"></h2>

<div class="card">
<h1 id="profit">+72%</h1>
<p>Прибыль</p>
</div>

<div class="card">
<p>Ваши токены: <b id="tokensAmount">0</b></p>
<p>Цена: <b>0.01289 SOL</b></p>
</div>

<div class="sell-buttons">
<button onclick="setSell(25)">25%</button>
<button onclick="setSell(75)">75%</button>
<button onclick="setSell(100)" class="active">100%</button>
</div>

<div class="card">
<p>Вы получите:</p>
<h2 id="receive">0.0 SOL</h2>
</div>

<button class="btn" onclick="sell()">Продать</button>

</div>

<script>
let balance = 0.678;
let currentToken = null;

function openModal(){
document.getElementById("modal").classList.add("active");
}

function createToken(){
let name = document.getElementById("name").value;
let ticker = document.getElementById("ticker").value;
let amount = parseFloat(document.getElementById("amount").value || 0);

if(!name || !ticker) return alert("Заполни поля");

currentToken = {
name,
ticker,
amount: 12500
};

document.getElementById("modal").classList.remove("active");

document.querySelector(".container").style.display="none";
document.getElementById("sell").style.display="block";

document.getElementById("tokenTitle").innerText = name + " $" + ticker;
document.getElementById("tokensAmount").innerText = currentToken.amount;

calcReceive(100);
}

function setSell(p){
calcReceive(p);

document.querySelectorAll(".sell-buttons button").forEach(b=>b.classList.remove("active"));
event.target.classList.add("active");
}

function calcReceive(percent){
let receive = (0.4192 * percent / 100).toFixed(4);
document.getElementById("receive").innerText = receive + " SOL";
}

function sell(){
alert("Продано!");
balance = 0.678; // фикс
document.getElementById("balance").innerText = balance + " SOL";

document.getElementById("sell").style.display="none";
document.querySelector(".container").style.display="block";
}
</script>

</body>
</html>
