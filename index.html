<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panfani</title>

<style>
body {
  margin: 0;
  background: #0B0F1A;
  font-family: sans-serif;
  color: white;
}

.app {
  max-width: 420px;
  margin: auto;
  padding: 20px;
}

.hidden { display: none; }

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.balance {
  background: #141A2A;
  padding: 8px 12px;
  border-radius: 12px;
}

.hero {
  margin-top: 40px;
}

.hero h1 {
  font-size: 26px;
}

.btn {
  width: 100%;
  padding: 14px;
  border-radius: 14px;
  border: none;
  font-weight: bold;
  margin-top: 15px;
}

.green { background: #B6FF00; color: black; }
.purple { background: #7c3aed; color: white; }

.card {
  background: #141A2A;
  padding: 20px;
  border-radius: 16px;
  margin-top: 20px;
}

input {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 12px;
  border: none;
  background: #1a1f2e;
  color: white;
}

.profitBox {
  text-align: center;
  font-size: 48px;
  color: #4CFF7A;
}

.sub {
  font-size: 16px;
  color: #aaa;
}

.sell-row {
  display: flex;
  gap: 10px;
  margin-top: 20px;
}

.sell-btn {
  flex: 1;
  padding: 12px;
  border-radius: 12px;
  background: #1a1f2e;
  border: none;
  color: white;
}

.active {
  background: #7c3aed;
}
</style>
</head>

<body>

<div class="app">

<!-- HOME -->
<div id="home">
  <div class="header">
    <div>
      <b>Panfani</b><br>
      <small style="color:#777">Create. Trade. Own.</small>
    </div>
    <div class="balance">0.678 SOL</div>
  </div>

  <div class="hero">
    <h1>Твой токен.<br>Твои правила.<br><span style="color:#a855f7">Твой успех.</span></h1>

    <button class="btn green" onclick="openCreate()">Создать токен</button>
  </div>
</div>

<!-- CREATE -->
<div id="create" class="hidden">
  <h2>Создать токен</h2>

  <input id="name" placeholder="Название токена">
  <input id="tag" placeholder="$ТЕГ (например CAT)">
  <input id="amount" placeholder="Стартовая покупка (SOL)">

  <button class="btn purple" onclick="createToken()">Создать токен</button>
  <button class="btn" onclick="goHome()">Назад</button>
</div>

<!-- SELL -->
<div id="sell" class="hidden">

  <button onclick="goHome()">←</button>

  <h2 id="tokenName"></h2>

  <div class="card">
    <div class="profitBox">
      +72%
      <div class="sub">(0.4192 SOL)</div>
    </div>
  </div>

  <div class="card">
    <div style="display:flex; justify-content:space-between;">
      <div>
        <small>Мои токены</small><br>
        <b>12,500</b>
      </div>
      <div>
        <small>Цена</small><br>
        <b>0.01289 SOL</b>
      </div>
    </div>
  </div>

  <div class="card">
    <div class="sell-row">
      <button class="sell-btn" onclick="setPercent(25, this)">25%</button>
      <button class="sell-btn" onclick="setPercent(75, this)">75%</button>
      <button class="sell-btn active" onclick="setPercent(100, this)">100%</button>
    </div>

    <div id="result" style="margin-top:20px;">
      Вы получите: 0.4192 SOL
    </div>

    <button class="btn purple" id="sellBtn">
      Продать 100%
    </button>
  </div>

</div>

</div>

<script>
let percent = 100;
const profit = 0.4192;

function openCreate() {
  show("create");
}

function goHome() {
  show("home");
}

function createToken() {
  const name = document.getElementById("name").value;
  document.getElementById("tokenName").innerText = name || "Token";
  show("sell");
}

function setPercent(p, el) {
  percent = p;

  document.querySelectorAll(".sell-btn").forEach(btn => {
    btn.classList.remove("active");
  });

  el.classList.add("active");

  const value = (profit * percent / 100).toFixed(4);
  document.getElementById("result").innerText =
    "Вы получите: " + value + " SOL";

  document.getElementById("sellBtn").innerText =
    "Продать " + percent + "%";
}

function show(id) {
  ["home","create","sell"].forEach(x => {
    document.getElementById(x).classList.add("hidden");
  });

  document.getElementById(id).classList.remove("hidden");
}
</script>

</body>
</html>
