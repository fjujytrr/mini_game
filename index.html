<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panfani</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: -apple-system, BlinkMacSystemFont, sans-serif;
}

body {
  background: #050507;
  color: white;
}

/* ЭКРАНЫ */
.screen {
  display: none;
  height: 100vh;
  overflow-y: auto;
  padding: 16px;
}

.active {
  display: block;
}

/* HEADER */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 16px;
}

.balance {
  background: rgba(255,255,255,0.05);
  padding: 12px 16px;
  border-radius: 16px;
  backdrop-filter: blur(10px);
}

/* HERO */
.hero {
  position: relative;
  border-radius: 24px;
  padding: 20px;
  overflow: hidden;
  background: radial-gradient(circle at 70% 30%, #6a00ff, #0b0b12);
}

.hero img {
  position: absolute;
  right: -40px;
  bottom: -20px;
  width: 250px;
  opacity: 0.9;
}

.hero h1 {
  font-size: 26px;
  line-height: 1.2;
}

.hero span {
  color: #8b5cf6;
}

/* BUTTON */
.btn {
  margin-top: 16px;
  padding: 14px;
  border-radius: 14px;
  border: none;
  width: 100%;
  font-size: 16px;
  cursor: pointer;
}

.btn-primary {
  background: linear-gradient(90deg,#7c3aed,#a855f7);
  color: white;
}

.btn-green {
  background: #c6ff00;
  color: black;
}

/* TOKEN LIST */
.tokens {
  margin-top: 20px;
  display: flex;
  gap: 10px;
}

.token {
  flex: 1;
  background: rgba(255,255,255,0.05);
  border-radius: 18px;
  padding: 14px;
  text-align: center;
}

/* CREATE */
.input {
  background: rgba(255,255,255,0.05);
  border: none;
  width: 100%;
  padding: 14px;
  border-radius: 12px;
  color: white;
  margin-top: 10px;
}

/* SELL */
.sell-card {
  margin-top: 20px;
  padding: 20px;
  border-radius: 20px;
  background: linear-gradient(145deg,#0c0c16,#1a1030);
}

.big {
  font-size: 48px;
  text-align: center;
  color: #00ff88;
}

.percent {
  display: flex;
  gap: 10px;
  margin-top: 16px;
}

.percent button {
  flex: 1;
  padding: 12px;
  border-radius: 10px;
  border: none;
  background: #111;
  color: white;
}

.percent .active {
  background: #7c3aed;
}

/* FOOTER */
.footer {
  position: fixed;
  bottom: 0;
  left: 0;
  width: 100%;
  display: flex;
  justify-content: space-around;
  padding: 10px;
  background: #0b0b12;
  border-top: 1px solid rgba(255,255,255,0.05);
}
</style>
</head>

<body>

<!-- HOME -->
<div id="home" class="screen active">

  <div class="header">
    <h2>Panfani</h2>
    <div class="balance">
      0.678 SOL
    </div>
  </div>

  <div class="hero">
    <h1>Твой токен.<br>Твои правила.<br><span>Твой успех.</span></h1>

    <!-- ВСТАВЬ СВОЮ КАРТИНКУ КОТА -->
    <img src="https://i.imgur.com/7QZ7Z7B.png">

    <button class="btn btn-green" onclick="go('create')">
      Создать токен +
    </button>
  </div>

  <div class="tokens">
    <div class="token">
      MYTOKEN<br>
      <small>+18.6%</small>
    </div>

    <div class="token" onclick="go('sell')">
      CATCOIN<br>
      <small style="color:red">-4.2%</small>
    </div>

    <div class="token">
      PANFANI<br>
      <small>+6.7%</small>
    </div>
  </div>

</div>

<!-- CREATE -->
<div id="create" class="screen">

  <h2>Создать токен</h2>

  <input class="input" placeholder="Название">
  <input class="input" placeholder="Тикер">
  <input class="input" placeholder="Стартовая покупка">

  <button class="btn btn-primary">Создать токен</button>

  <button class="btn" onclick="go('home')">Назад</button>

</div>

<!-- SELL -->
<div id="sell" class="screen">

  <h2>Panfani Cat</h2>

  <div class="sell-card">

    <div class="big">+72%</div>

    <p style="text-align:center;">12,500 CAT</p>

    <div class="percent">
      <button onclick="setP(25)">25%</button>
      <button onclick="setP(75)">75%</button>
      <button onclick="setP(100)" class="active">100%</button>
    </div>

    <h3 id="res" style="text-align:center;margin-top:10px;">
      0.4192 SOL
    </h3>

    <button class="btn btn-primary">Продать</button>
  </div>

  <button class="btn" onclick="go('home')">Назад</button>

</div>

<div class="footer">
  <div>🏠</div>
  <div>📈</div>
  <div>💼</div>
  <div>👤</div>
</div>

<script>
function go(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function setP(p){
  let base = 0.4192;
  let val = (base * p / 100).toFixed(4);

  document.getElementById('res').innerText = val + " SOL";

  document.querySelectorAll('.percent button').forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
}
</script>

</body>
</html>
